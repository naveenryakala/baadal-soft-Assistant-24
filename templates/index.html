<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baadalsoft | GenAI Chat Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">Baadalsoft</span> Assistant
            </div>
            <div class="status-indicator">
                <span class="dot pulse"></span> Online
            </div>
        </header>

        <main id="chat-window">
            <div class="welcome-message">
                <h1>How can I help you today?</h1>
                <p>I'm your AI assistant, grounded in company documentation. Ask me about resetting passwords, account creation, or support.</p>
            </div>
            <div id="messages-container">
                <!-- Messages will appear here -->
            </div>
        </main>

        <footer>
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
            <div class="footer-note">
                Powered by Gemini & RAG Technology
            </div>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
